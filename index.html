<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Лера и Женя: English Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f2f0f9; 
            --text-main: #5e6d81;
            --accent-blue: #667eea;
            --accent-pink: #ff85a2;
            --correct: #a8e6cf;
            --wrong: #ff8b94;
            --soft-shadow: 8px 8px 16px #d1d9e9, -8px -8px 16px #ffffff;
            --inner-shadow: inset 5px 5px 10px #d1d9e9, inset -5px -5px 10px #ffffff;
        }

        body {
            margin: 0; 
            background: linear-gradient(135deg, #f2f0f9 0%, #e6e9f0 100%);
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
            box-sizing: border-box;
        }

        body::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: radial-gradient(#667eea11 1px, transparent 1px);
            background-size: 25px 25px; z-index: -1;
        }

        .header { 
            padding: 10px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
            flex-shrink: 0;
        }
        
        .app-title-card {
            background: var(--bg-color); 
            padding: 10px 25px; 
            border-radius: 50px;
            box-shadow: 6px 6px 12px #d1d9e9, -6px -6px 12px #ffffff;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-width: 220px;
        }
        .names { font-weight: 800; background: linear-gradient(45deg, #ff85a2, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.1rem; line-height: 1.2; }
        
        .sub-title { 
            font-family: 'Comfortaa', cursive;
            font-size: 0.9rem; 
            background: linear-gradient(45deg, #667eea, #ff85a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700; 
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .round-info { color: #667eea; font-size: 0.75rem; font-weight: 700; margin-top: 4px; opacity: 0.8; }

        .progress-container { width: 100%; max-width: 260px; margin-top: 5px; }
        .progress-info { display: flex; justify-content: center; font-size: 0.7rem; font-weight: 800; color: var(--accent-blue); margin-bottom: 2px; }
        .progress-track { height: 8px; background: var(--bg-color); border-radius: 10px; box-shadow: var(--inner-shadow); overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.5s ease; }

        .game-container { 
            flex: 1; 
            position: relative; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px; 
            min-height: 0; 
        }

        #step-counter {
            position: absolute; 
            bottom: 20px; 
            right: 20px; 
            font-size: 0.85rem; 
            font-weight: 800; 
            color: #7e8ba3;
            background: var(--bg-color); 
            padding: 6px 14px; 
            border-radius: 20px; 
            box-shadow: 4px 4px 8px #d1d9e9, -4px -4px 8px #ffffff;
            z-index: 10;
        }

        .drop-zone {
            position: absolute; width: 105px; height: 140px; display: flex; align-items: center; justify-content: center;
            background: var(--bg-color); border-radius: 25px; font-weight: 700; color: var(--text-main);
            box-shadow: var(--inner-shadow); transition: all 0.3s; font-size: 0.85rem; text-align: center; padding: 8px; box-sizing: border-box;
            border: 2px solid transparent;
        }
        .top { top: 0px; } .bottom { bottom: 0px; } .left { left: 10px; } .right { right: 10px; }
        
        #drag-card {
            width: 130px; height: 170px; 
            background: var(--bg-color); 
            border-radius: 35px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 12px 12px 24px #cbd5e0, -12px -12px 24px #ffffff; 
            touch-action: none; z-index: 100;
            cursor: grab;
            border: 1px solid rgba(255,255,255,0.8);
            animation: pulse-card 4s infinite ease-in-out;
        }
        
        @keyframes pulse-card {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 15px 15px 30px #b8c2d1, -10px -10px 25px #ffffff; }
            100% { transform: scale(1); }
        }

        #drag-card:active { cursor: grabbing; animation: none; transform: scale(1.05); }

        .sentence-display { font-size: 1.15rem; font-weight: 600; color: var(--text-main); text-align: center; line-height: 1.4; padding: 0 15px; }
        .translation-hint { font-size: 0.9rem; color: #a0aec0; margin-bottom: 12px; font-style: italic; text-align: center; }
        .blank-placeholder { border-bottom: 3px solid var(--accent-blue); padding: 0 8px; color: var(--accent-blue); font-weight: 800; }
        
        .word-chip {
            padding: 12px 16px; background: var(--bg-color); border-radius: 15px;
            box-shadow: 6px 6px 12px #d1d9e9, -6px -6px 12px #ffffff;
            border: none; cursor: pointer; color: var(--text-main); font-weight: 700; transition: 0.2s; font-size: 0.95rem;
        }
        .word-chip:active { box-shadow: var(--inner-shadow); transform: scale(0.95); }

        #loader {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px;
        }
        .loader-spinner {
            width: 40px; height: 40px; border: 4px solid #d1d9e9;
            border-top-color: var(--accent-blue); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #error-banner {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 4000;
            background: var(--wrong); color: #fff; font-weight: 700; font-size: 0.85rem;
            padding: 10px 16px; text-align: center;
        }

        #finish-overlay {
            position: fixed; top: 50%; left: 50%; width: 0; height: 0;
            background: radial-gradient(circle, #764ba2 0%, #ff85a2 100%);
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.8s ease-in;
        }
        #finish-overlay.active { width: 300vmax; height: 300vmax; opacity: 1; border-radius: 0; pointer-events: auto; }
        
        .tab-bar { 
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            padding-top: 10px;
            flex-shrink: 0;
            background: rgba(242, 240, 249, 0.7);
            backdrop-filter: blur(15px);
        }
        .nav-btn {
            padding: 12px 12px; border-radius: 18px; border: none; background: var(--bg-color);
            box-shadow: 4px 4px 8px #d1d9e9, -4px -4px 8px #ffffff; color: #7e8ba3; font-weight: 700; font-size: 0.7rem;
            cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active { color: var(--accent-blue); box-shadow: var(--inner-shadow); transform: scale(1.05); }

        .is-correct-bg { background-color: var(--correct) !important; color: #2d5a4c !important; box-shadow: inset 4px 4px 8px #8ac7b1 !important; border-color: #8ac7b1 !important; }
        .is-wrong-bg { background-color: var(--wrong) !important; color: white !important; box-shadow: inset 4px 4px 8px #e27a82 !important; }
    </style>
</head>
<body>

    <div id="error-banner"></div>

    <div id="loader">
        <h2 class="names" style="font-family: 'Comfortaa';">Загружаем магию...</h2>
        <div class="loader-spinner"></div>
    </div>

    <div id="finish-overlay">
        <h1 style="color:white; text-align:center; font-family: 'Comfortaa'; font-size: 2.2rem; margin-bottom: 20px;">ТЫ СУПЕР! 🎉</h1>
        <div style="display:flex; flex-direction:column; gap:12px;">
            <button class="word-chip" onclick="nextRound()">Ещё раунд!</button>
            <button class="word-chip" onclick="resetApp()" style="background:#ff8b94; color:white;">Начать сначала</button>
        </div>
    </div>

    <header class="header">
        <div class="app-title-card">
            <span class="names">Лера и Женя</span>
            <span class="sub-title">Learn English</span>
            <span class="round-info" id="round-title">Загрузка...</span>
        </div>
        <div class="progress-container">
            <div class="progress-info" id="progress-percent">0%</div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        </div>
    </header>

    <main class="game-container" id="game-area"></main>
    <div id="step-counter">0/0</div>

    <nav class="tab-bar">
        <button id="nav-dict"   class="nav-btn active" onclick="setMode('dict')">🃏 Слова</button>
        <button id="nav-blanks" class="nav-btn"        onclick="setMode('blanks')">✍️ Пропуски</button>
        <button id="nav-const"  class="nav-btn"        onclick="setMode('const')">🧩 Сборка</button>
    </nav>

    <script>
    const SHEET_LINKS = {
        dict:   "dict.csv",
        blanks: "blanks.csv",
        const:  "const.csv"
    };

    let RAW_DATA = { dict: [], blanks: [], const: [] };
    let currentMode   = 'dict';
    let currentIndex  = 0;
    let dragX = 0, dragY = 0;
    let builtArr = [];

    let roundProgress = {
        dict:   parseInt(localStorage.getItem('round_dict'))   || 1,
        blanks: parseInt(localStorage.getItem('round_blanks')) || 1,
        const:  parseInt(localStorage.getItem('round_const'))  || 1
    };

    function escAttr(str) {
        return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function showError(msg) {
        const banner = document.getElementById('error-banner');
        banner.textContent = msg;
        banner.style.display = 'block';
        setTimeout(() => banner.style.display = 'none', 5000);
    }

    async function init() {
        try {
            for (let mode in SHEET_LINKS) {
                const response = await fetch(SHEET_LINKS[mode]);
                if (!response.ok) throw new Error(`Файл ${SHEET_LINKS[mode]} не найден!`);
                const csvText = await response.text();
                const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                RAW_DATA[mode] = parsed.data;
            }
            document.getElementById('loader').style.display = 'none';
            renderStep();
        } catch (e) {
            showError(`Ошибка загрузки: ${e.message}.`);
            document.getElementById('loader').style.display = 'none';
        }
    }

    function getActiveData() {
        const r = roundProgress[currentMode];
        return RAW_DATA[currentMode].filter(item => parseInt(item.round) === r);
    }

    function setMode(mode) {
        currentMode  = mode;
        currentIndex = 0;
        builtArr     = [];
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('nav-' + mode).classList.add('active');
        renderStep();
    }

    function renderStep() {
        const area     = document.getElementById('game-area');
        const modeData = getActiveData();
        const total    = modeData.length;
        const curRound = roundProgress[currentMode];

        document.getElementById('round-title').innerText = `${getModeName(currentMode)} | Раунд ${curRound}`;

        if (total === 0) {
            area.innerHTML = `<div style="text-align:center; color:var(--text-main); padding:20px; font-family:'Comfortaa'">Все раунды пройдены! 🏆</div>`;
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('progress-percent').innerText = '100%';
            document.getElementById('step-counter').innerText = '0/0';
            return;
        }

        if (currentIndex >= total) {
            showFinish();
            return;
        }

        const data    = modeData[currentIndex];
        const percent = Math.round((currentIndex / total) * 100);
        document.getElementById('progress-fill').style.width   = percent + '%';
        document.getElementById('progress-percent').innerText  = percent + '%';
        document.getElementById('step-counter').innerText      = (currentIndex + 1) + '/' + total;

        if (currentMode === 'dict') {
            area.innerHTML = `
                <div id="drop-0" class="drop-zone top">${data.opt0 || ''}</div>
                <div id="drop-1" class="drop-zone left">${data.opt1 || ''}</div>
                <div id="drop-2" class="drop-zone right">${data.opt2 || ''}</div>
                <div id="drop-3" class="drop-zone bottom">${data.opt3 || ''}</div>
                <div id="drag-card">
                    <span style="font-size:1.4rem; font-weight:800; color:var(--accent-blue); text-align:center; padding: 0 10px">${data.word || ''}</span>
                    <span style="color:#a0aec0; font-size:0.85rem; margin-top:8px; font-weight:600;">${data.trans || ''}</span>
                </div>
            `;
            const correctIdx = parseInt(data.correct) >= 0 ? parseInt(data.correct) : 0;
            initDragLogic(correctIdx);

        } else if (currentMode === 'blanks') {
            const parts = (data.sentence || '').split('___');
            const opts   = [data.opt0, data.opt1, data.opt2, data.opt3];
            const correctIdx = parseInt(data.correct) >= 0 ? parseInt(data.correct) : 0;

            area.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; gap:20px; width:100%;">
                    <div class="sentence-display">
                        ${parts[0] || ''}<span class="blank-placeholder" id="placeholder">___</span>${parts[1] || ''}
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; width:100%; max-width:280px;">
                        ${opts.map((opt, i) =>
                            `<button class="word-chip" onclick="checkBlankChoice(${i}, ${correctIdx}, this)">${opt || ''}</button>`
                        ).join('')}
                    </div>
                </div>
            `;

        } else if (currentMode === 'const') {
            const chipsRaw = (data.chips || '').split(',').map(w => w.trim()).filter(Boolean);
            const chips = [...chipsRaw].sort(() => Math.random() - 0.5);
            const correct = (data.correct || '').trim();

            area.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; gap:15px; width:100%;">
                    <div class="translation-hint">${data.ru || ''}</div>
                    <div id="built-sentence" class="sentence-display"
                         style="min-height:40px; border-bottom:2px dashed #d1d9e9; width:100%; max-width:320px; padding-bottom:8px;">
                        ${builtArr.join(' ')}
                    </div>
                    <div id="chips-area" style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
                        ${renderChips(chips, correct)}
                    </div>
                    ${builtArr.length > 0
                        ? `<button class="word-chip" style="font-size:0.75rem; color:#a0aec0;" onclick="clearBuilt()">↩ Сбросить</button>`
                        : ''}
                </div>
            `;
        }
    }

    function renderChips(chips, correct) {
        const usedCount = {};
        builtArr.forEach(w => { usedCount[w] = (usedCount[w] || 0) + 1; });

        return chips.map((word, idx) => {
            const used   = usedCount[word] || 0;
            const dupIdx = chips.slice(0, idx).filter(w => w === word).length;
            const hidden = dupIdx < used;
            return `<button class="word-chip"
                style="${hidden ? 'visibility:hidden; pointer-events:none;' : ''}"
                onclick="handleConstClick(this, '${escAttr(correct)}', '${escAttr(word)}')"
            >${word}</button>`;
        }).join('');
    }

    function clearBuilt() {
        builtArr = [];
        renderStep();
    }

    function getModeName(m) {
        return m === 'dict' ? 'Словарик' : m === 'blanks' ? 'Пропуски' : 'Сборка';
    }

    function initDragLogic(correctIdx) {
        dragX = 0; dragY = 0;

        // ── ИСПРАВЛЕНИЕ БАГА: флаг не даёт двум зонам сработать за один бросок ──
        let dropHandled = false;

        interact('#drag-card').draggable({
            listeners: {
                start() {
                    dropHandled = false; // новый бросок — сбрасываем флаг
                },
                move(e) {
                    dragX += e.dx; dragY += e.dy;
                    e.target.style.transform = `translate(${dragX}px, ${dragY}px) rotate(${dragX / 12}deg)`;
                    e.target.style.animation = 'none';
                },
                end(e) {
                    dragX = 0; dragY = 0;
                    e.target.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    e.target.style.transform  = 'translate(0,0) rotate(0deg)';
                    setTimeout(() => {
                        if (e.target) {
                            e.target.style.transition = '';
                            e.target.style.animation = 'pulse-card 4s infinite ease-in-out';
                        }
                    }, 420);
                }
            }
        });

        interact('.drop-zone').dropzone({
            overlap: 0.15,
            ondrop(e) {
                if (dropHandled) return; // уже обработан этот бросок — игнорируем

                const zoneIdx = parseInt(e.target.id.split('-')[1]);
                if (zoneIdx === correctIdx) {
                    dropHandled = true; // правильно — блокируем остальные зоны
                    e.target.classList.add('is-correct-bg');
                    confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 }, colors: ['#667eea', '#ff85a2'] });
                    setTimeout(() => { currentIndex++; renderStep(); }, 500);
                } else {
                    // Неверно — флаг НЕ ставим, можно попробовать снова
                    e.target.classList.add('is-wrong-bg');
                    setTimeout(() => e.target.classList.remove('is-wrong-bg'), 800);
                }
            }
        });
    }

    function checkBlankChoice(idx, correct, btn) {
        if (idx === correct) {
            btn.classList.add('is-correct-bg');
            confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
            const ph = document.getElementById('placeholder');
            if (ph) ph.innerText = btn.innerText;
            setTimeout(() => { currentIndex++; renderStep(); }, 600);
        } else {
            btn.classList.add('is-wrong-bg');
            setTimeout(() => btn.classList.remove('is-wrong-bg'), 800);
        }
    }

    function handleConstClick(btn, target, word) {
        builtArr.push(word);
        const built = builtArr.join(' ');
        if (target.startsWith(built)) {
            if (built === target) {
                confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 } });
                currentIndex++; builtArr = []; setTimeout(renderStep, 300);
            } else { renderStep(); }
        } else {
            btn.classList.add('is-wrong-bg');
            setTimeout(() => { builtArr = []; renderStep(); }, 500);
        }
    }

    function showFinish() {
        document.getElementById('finish-overlay').classList.add('active');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function nextRound() {
        roundProgress[currentMode]++;
        localStorage.setItem(`round_${currentMode}`, roundProgress[currentMode]);
        currentIndex = 0;
        document.getElementById('finish-overlay').classList.remove('active');
        renderStep();
    }

    function resetApp() {
        if (confirm("Сбросить всё и начать с 1 раунда?")) {
            localStorage.clear();
            location.reload();
        }
    }

    init();
    </script>
</body>
</html>
